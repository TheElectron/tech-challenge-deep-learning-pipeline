apiVersion: 1

groups:
  - orgId: 1
    name: lstm-api
    folder: LSTM API
    interval: 1m
    rules:

      # -----------------------------------------------------------------------
      # Alert 1: P95 prediction latency spike
      # Fires when the 95th-percentile latency for /predict exceeds 1 second
      # for more than 5 consecutive minutes.
      # -----------------------------------------------------------------------
      - uid: high-p95-latency
        title: High P95 Prediction Latency
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: >-
                histogram_quantile(
                  0.95,
                  sum(rate(http_request_duration_seconds_bucket{path="/predict"}[5m])) by (le)
                )
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [1.0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
                  type: query
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "P95 /predict latency above 1 s"
          description: >-
            The 95th-percentile latency for /predict has exceeded 1 second for
            5 minutes. Investigate model load time, input sequence size, or
            upstream resource contention.
        labels:
          severity: warning
        isPaused: false

      # -----------------------------------------------------------------------
      # Alert 2: High 5xx error rate
      # Fires when the API returns more than 0.05 server errors per second
      # (≈ 3 errors/min) sustained for 2 minutes.
      # -----------------------------------------------------------------------
      - uid: high-error-rate
        title: High API Error Rate
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: "sum(rate(http_requests_total{status_code=~\"5..\"}[2m]))"
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
                  type: query
        for: 2m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "5xx error rate above 0.05 req/s"
          description: >-
            The API is returning more than 0.05 5xx errors per second over the
            last 2 minutes. Check API logs, model availability, and MLflow
            registry connectivity.
        labels:
          severity: critical
        isPaused: false

      # -----------------------------------------------------------------------
      # Alert 3: Champion model RMSE degraded (prediction distribution shift proxy)
      # Fires when the loaded champion's test-set RMSE rises above 7.0 —
      # a level comparable to the rejected AttentionLSTM challenger (8.17).
      # This is the Prometheus-observable signal for model quality regression;
      # the full Evidently drift report (POST /monitoring/report) provides
      # the feature-level breakdown.
      # -----------------------------------------------------------------------
      - uid: model-rmse-degraded
        title: Champion Model RMSE Degraded
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: model_rmse
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [7.0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
                  type: query
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Champion model RMSE above 7.0"
          description: >-
            The loaded champion model's test-set RMSE has exceeded 7.0, which
            is comparable to the rejected AttentionLSTM challenger (8.17).
            Investigate recent registry promotions or trigger a retraining run.
            Run `python scripts/build_reference.py` and POST /monitoring/report
            for a full Evidently drift breakdown.
        labels:
          severity: warning
        isPaused: false
